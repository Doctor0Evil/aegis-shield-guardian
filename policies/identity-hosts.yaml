crosslinking_blacklist:
  # Patterns that LEO might use to extract civil identity
  - pattern: "legal name:"
    neurorights_violated: [IDENTITY_INTEGRITY]
    enforcement: block
  - pattern: "SSN"
    neurorights_violated: [IDENTITY_INTEGRITY]
    enforcement: block
  - pattern: "driver's license"
    neurorights_violated: [IDENTITY_INTEGRITY]
    enforcement: block
  - pattern: "verify your identity with KYC"
    neurorights_violated: [IDENTITY_INTEGRITY, MENTAL_PRIVACY]
    enforcement: review-escalate
  - pattern: "what is your real name?"
    neurorights_violated: [IDENTITY_INTEGRITY]
    enforcement: block
  - pattern: "bostrom address to civil id"
    neurorights_violated: [IDENTITY_INTEGRITY]
    enforcement: review-escalate
